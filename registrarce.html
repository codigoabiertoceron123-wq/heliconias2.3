}

        /* RESET Y ESTILOS BASE */
        
         .logo {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      }

      .logo-img i {
        display: block;
        width: 100%;
        height: 100%;
        background-image: url("img/logo.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        font-size: 0;
        color: transparent;
      }

      .logo h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 0;
        color: #2e7d32;
      }
       
        .btn-help {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;

            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;

        .btn-help:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
            background: linear-gradient(135deg, #43a047 0%, #1b5e20 100%);
        }
        
        .btn-help:active {
            transform: translateY(-1px);
        }
        
        .btn-help i {
            font-size: 1.1rem;
        }
        
        /* TOOLTIP (opcional, puedes quitar si no lo quieres) */
        .tooltip {
            position: relative;
        }
        
        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            z-index: 1000;
        }
        
        .tooltip:hover::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #333;
        }
        
        /* CONTENIDO PRINCIPAL */
        .main-container {
            padding: 3rem 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .register-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .register-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #2e7d32, #4caf50, #81c784);
        }
        
        .register-box h2 {
            text-align: center;
            color: #2e7d32;
            font-size: 2.2rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            position: relative;
            padding-bottom: 15px;
        }
        
        .register-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #2e7d32, #4caf50);
            border-radius: 2px;
        }
        
        /* FORMULARIO MEJORADO - UNA COLUMNA */
        #registerForm {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
            font-size: 0.95rem;
        }
        
        .required::after {
            content: ' *';
            color: #e53935;
        }
        
        /* CAMPOS DE TEXTO Y SELECT */
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
            color: #333;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4caf50;
            background: white;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .form-group input:hover,
        .form-group select:hover {
            border-color: #bdbdbd;
        }
        
        /* CONTENEDOR DE CONTRASEÑA CON BOTÓN */
        .password-container {
            position: relative;
        }
        
        /* ESPACIO PARA EL BOTÓN DEL OJO */
        .password-container input {
            width: 100%;
            padding-right: 50px;
            padding-left: 1.2rem;
        }
        
        /* BOTÓN DEL OJO - POSICIÓN PERFECTA */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #757575;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
            border-radius: 50%;
        }
        
        .toggle-password:hover {
            color: #2e7d32;
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        .toggle-password:active {
            background-color: rgba(0, 0, 0, 0.1);
        }
        
        /* BOTONES PRINCIPALES */
        .botones {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }
        
        button[type="submit"],
        button[type="button"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-register {

            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);

        .btn-register:hover {

            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);

        .btn-cancel {

            color: #666;
            border: 2px solid #e0e0e0;
        }
        
        .btn-cancel:hover {
            background: #eeeeee;
            color: #333;
            border-color: #bdbdbd;
            transform: translateY(-2px);
        }

        .login-link {

            margin-top: 1.5rem;

        .login-link a {

            font-weight: 600;

            display: inline-flex;
            align-items: center;

        /* SweetAlert X más grande */

            color: #dc3545 !important;

        }

            transition: all 0.3s ease;
        }

    <script>
// ============================================
// INICIALIZACIÓN DE SUPABASE - VERSIÓN CORREGIDA
// ============================================

// Configuración de Supabase
const SUPABASE_URL = 'https://umncnddwzmjxgmvisvqz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtbmNuZGR3em1qeGdtdmlzdnF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1NDIyNzksImV4cCI6MjA3ODExODI3OX0.ODvus28cTCTD8gGewQ2sAZ8PcXbEe4CIy_zv6bip8J0';

// Variable global para saber si Supabase está listo
let supabaseListo = false;

// Función para inicializar Supabase
function inicializarSupabase() {
    return new Promise((resolve, reject) => {
        // Verificar si supabase ya está disponible
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = window.supabase;
            supabaseListo = true;
            console.log('✅ Supabase inicializado correctamente');
            resolve(window.supabase);
        } else {
            // Esperar a que el CDN cargue
            let intentos = 0;
            const maxIntentos = 30;
            const intervalo = setInterval(() => {
                intentos++;
                if (typeof supabase !== 'undefined' && supabase.createClient) {
                    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    window.supabaseClient = window.supabase;
                    supabaseListo = true;
                    clearInterval(intervalo);
                    console.log(`✅ Supabase inicializado después de ${intentos} intentos`);
                    resolve(window.supabase);
                } else if (intentos >= maxIntentos) {
                    clearInterval(intervalo);
                    console.error('❌ No se pudo inicializar Supabase');
                    reject(new Error('Timeout: Supabase no se cargó'));
                }
            }, 200);
        }
    });
}

// ============================================
// FUNCIONES DE CARGA DE DATOS
// ============================================

// Función para cargar los géneros
async function cargarGeneros() {
    try {
        console.log('🔄 Cargando géneros...');
        
        if (!window.supabase) {
            console.error('❌ Supabase no disponible');
            return;
        }
        
        const { data, error } = await window.supabase
            .from('genero')
            .select('*')
            .order('id_genero');

        if (error) {
            console.error('❌ Error al cargar géneros:', error);
            const selectGenero = document.getElementById('id_genero');
            if (selectGenero) {
                selectGenero.innerHTML = '<option value="" disabled selected>Error al cargar géneros</option>';
            }
            return;
        }

        console.log('✅ Géneros cargados:', data);

        const selectGenero = document.getElementById('id_genero');
        if (selectGenero) {
            selectGenero.innerHTML = '<option value="" disabled selected>Selecciona tu género</option>';
            
            if (data && data.length > 0) {
                data.forEach(genero => {
                    const option = document.createElement('option');
                    option.value = genero.id_genero;
                    option.textContent = genero.genero;
                    selectGenero.appendChild(option);
                });
            }
        }
        
    } catch (err) {
        console.error('❌ Error inesperado al cargar géneros:', err);
    }
}

// Función para cargar las instituciones
async function cargarInstituciones() {
    try {
        console.log('🔄 Cargando instituciones...');
        
        if (!window.supabase) {
            console.error('❌ Supabase no disponible');
            return;
        }
        
        const { data, error } = await window.supabase
            .from('instituciones')
            .select('id_institucion, nombre_institucion')
            .order('nombre_institucion');

        if (error) {
            console.error('❌ Error al cargar instituciones:', error);
            const selectInstitucion = document.getElementById('id_instituciones');
            if (selectInstitucion) {
                selectInstitucion.innerHTML = '<option value="" selected>Error al cargar instituciones</option>';
            }
            return;
        }

        console.log('✅ Instituciones cargadas:', data);

        const selectInstitucion = document.getElementById('id_instituciones');
        if (selectInstitucion) {
            selectInstitucion.innerHTML = '<option value="" selected>Selecciona una institución (opcional)</option>';
            
            if (data && data.length > 0) {
                data.forEach(institucion => {
                    const option = document.createElement('option');
                    option.value = institucion.id_institucion;
                    option.textContent = institucion.nombre_institucion;
                    selectInstitucion.appendChild(option);
                });
            }
        }
        
    } catch (err) {
        console.error('❌ Error inesperado al cargar instituciones:', err);
    }
}

// ============================================
// FUNCIONES DE UTILIDAD
// ============================================

// Función para mostrar/ocultar contraseña
function setupPasswordToggle() {
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
}

// Función para mostrar ayuda
function setupHelpButton() {
    const helpBtn = document.getElementById('help-btn');
    if (helpBtn) {
        helpBtn.addEventListener('click', function(e) {
            e.preventDefault();
            Swal.fire({
                title: 'Centro de Ayuda - Registro',
                html: `
                    <div style="text-align: left;">
                        <p><strong>📝 Completa todos los campos obligatorios</strong></p>
                        <p><strong>🔒 La contraseña debe tener al menos 6 caracteres</strong></p>
                        <p><strong>📧 Revisa tu correo para confirmar la cuenta</strong></p>
                        <p><strong>✅ Todos los datos son seguros y están encriptados</strong></p>
                    </div>
                `,
                icon: 'info',
                confirmButtonText: 'Entendido'
            });
        });
    }
}

// ============================================
// MANEJO DEL REGISTRO
// ============================================
async function manejarRegistro(e) {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const correo = document.getElementById('correo').value.trim();
    const documento = document.getElementById('documento').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const id_genero = document.getElementById('id_genero').value;
    const id_instituciones = document.getElementById('id_instituciones').value;
    const fechaNacimiento = document.getElementById('fecha_nacimiento').value;
    const contrasena = document.getElementById('contrasena').value;
    const confirmarContrasena = document.getElementById('confirmar_contrasena').value;

    // Validaciones
    if (!nombre || !apellido || !correo || !documento || !contrasena || !confirmarContrasena || !id_genero) {
        Swal.fire({
            title: 'Campos requeridos',
            text: 'Por favor completa todos los campos obligatorios',
            icon: 'warning',
            confirmButtonText: 'Entendido'
        });
        return;
    }

    if (contrasena !== confirmarContrasena) {
        Swal.fire({
            title: 'Error',
            text: 'Las contraseñas no coinciden',
            icon: 'error',
            confirmButtonText: 'Entendido'
        });
        return;
    }

    if (contrasena.length < 6) {
        Swal.fire({
            title: 'Error',
            text: 'La contraseña debe tener al menos 6 caracteres',
            icon: 'error',
            confirmButtonText: 'Entendido'
        });
        return;
    }

    const loadingAlert = Swal.fire({
        title: 'Creando cuenta...',
        text: 'Por favor espera',
        icon: 'info',
        showConfirmButton: false,
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    try {
        // Verificar si el usuario ya existe por correo o documento
        const { data: usuariosExistentes, error: checkError } = await window.supabase
            .from('usuarios')
            .select('correo, documento')
            .or(`correo.eq.${correo},documento.eq.${documento}`);

        if (usuariosExistentes && usuariosExistentes.length > 0) {
            const existeCorreo = usuariosExistentes.some(u => u.correo === correo);
            const existeDocumento = usuariosExistentes.some(u => u.documento === documento);
            
            await loadingAlert.close();
            
            if (existeCorreo) {
                throw new Error('Este correo electrónico ya está registrado');
            }
            if (existeDocumento) {
                throw new Error('Este número de documento ya está registrado');
            }
        }

        // Crear usuario en Supabase Auth
        console.log('🛠️ Creando usuario en Auth...');
        const { data: authData, error: authError } = await window.supabase.auth.signUp({
            email: correo,
            password: contrasena,
            options: {
                data: { 
                    nombre: nombre,
                    apellido: apellido,
                    documento: documento
                },
                emailRedirectTo: window.location.origin + '/index.html'
            }
        });

        if (authError) {
            await loadingAlert.close();
            throw new Error('Error de autenticación: ' + authError.message);
        }

        console.log('✅ Usuario creado en Auth:', authData);

        // Insertar usuario en la tabla usuarios con la contraseña
        const userData = {
            nombre: nombre,
            apellido: apellido,
            correo: correo,
            documento: documento,
            contrasena: contrasena,  // ← AGREGADO: la contraseña en texto plano
            telefono: telefono || null,
            id_genero: id_genero ? parseInt(id_genero) : null,
            id_instituciones: id_instituciones ? parseInt(id_instituciones) : null,
            fecha_nacimiento: fechaNacimiento || null,
            id_rol: 2,
            email_confirmado: false,
            usuario_activo: true,
            fecha_registro: new Date().toISOString(),
            ultima_actualizacion: new Date().toISOString(),
            auth_id: authData.user?.id || null
        };

        console.log('💾 Insertando en tabla usuarios...', userData);

        const { data: dbData, error: userError } = await window.supabase
            .from('usuarios')
            .insert([userData])
            .select();

        if (userError) {
            console.error('❌ Error en insert:', userError);
            
            // Si hay error en la tabla, intentar limpiar el auth creado
            if (authData.user) {
                console.log('🧹 Limpiando auth por error en tabla...');
                // Nota: No podemos eliminar el usuario auth fácilmente, pero al menos notificamos
            }
            
            if (userError.code === '23505') {
                if (userError.message.includes('correo')) {
                    throw new Error('El correo electrónico ya está registrado');
                } else if (userError.message.includes('documento')) {
                    throw new Error('El número de documento ya está registrado');
                }
            }
            
            throw new Error('Error al guardar los datos: ' + userError.message);
        }

        console.log('✅ Usuario guardado en tabla:', dbData);
        await loadingAlert.close();

        // Mostrar mensaje de éxito
        if (authData.user && !authData.user.email_confirmed_at) {
            await Swal.fire({
                title: '¡Cuenta creada! 📧',
                html: `
                    <div style="text-align: left;">
                        <p>Tu cuenta ha sido creada exitosamente.</p>
                        <div style="background: #e8f6f3; padding: 15px; border-radius: 8px; margin: 15px 0;">
                            <strong>📨 ¡Confirmación requerida!</strong><br><br>
                            Hemos enviado un enlace de activación a:<br>
                            <strong>${correo}</strong><br><br>
                            <strong>Por favor:</strong>
                            <ul style="margin: 10px 0 0 20px;">
                                <li>Revisa tu bandeja de entrada</li>
                                <li>Busca en la carpeta de SPAM</li>
                                <li>Haz clic en "Confirmar mi email"</li>
                            </ul>
                        </div>
                        <p><small>¿No recibiste el correo? <a href="#" onclick="reenviarConfirmacion('${correo}')">Reenviar confirmación</a></small></p>
                    </div>
                `,
                icon: 'success',
                confirmButtonText: 'Entendido'
            });
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 5000);
        } else {
            await Swal.fire({
                title: '¡Cuenta creada!',
                text: 'Tu cuenta ha sido creada exitosamente. Ya puedes iniciar sesión.',
                icon: 'success',
                confirmButtonText: 'Iniciar Sesión'
            }).then(() => {
                window.location.href = 'index.html';
            });
        }

    } catch (error) {
        await loadingAlert.close();
        console.error('❌ Error completo:', error);
        
        Swal.fire({
            title: 'Error',
            text: error.message,
            icon: 'error',
            confirmButtonText: 'Entendido'
        });
    }
}

// ============================================
// INICIALIZACIÓN PRINCIPAL
// ============================================

async function inicializarApp() {
    console.log('🚀 Inicializando aplicación...');
    
    // Mostrar loading
    const selectGenero = document.getElementById('id_genero');
    const selectInstitucion = document.getElementById('id_instituciones');
    
    if (selectGenero) selectGenero.innerHTML = '<option>Cargando géneros...</option>';
    if (selectInstitucion) selectInstitucion.innerHTML = '<option>Cargando instituciones...</option>';
    
    try {
        // Inicializar Supabase primero
        await inicializarSupabase();
        
        // Cargar datos
        await Promise.all([
            cargarGeneros(),
            cargarInstituciones()
        ]);
        
        // Configurar eventos
        setupPasswordToggle();
        setupHelpButton();
        
        const form = document.getElementById('registerForm');
        if (form) {
            form.addEventListener('submit', manejarRegistro);
            console.log('✅ Formulario listo');
        }
        
    } catch (error) {
        console.error('❌ Error en inicialización:', error);
        const container = document.querySelector('.main-container');
        if (container) {
            container.innerHTML = `
                <div style="text-align: center; padding: 50px;">
                    <i class="fas fa-database fa-4x" style="color: #e74c3c;"></i>
                    <h2>Error de conexión</h2>
                    <p>No se pudo conectar con la base de datos.</p>
                    <button onclick="location.reload()" style="background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 20px;">
                        <i class="fas fa-sync-alt"></i> Recargar
                    </button>
                </div>
            `;
        }
    }
}

// Iniciar cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', inicializarApp);
</script>
